name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libssl-dev \
            python3

      - name: Configure and build (CMake + OpenSSL + tests)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DVSECURE_BUILD_TESTS=ON
          cmake --build build -j"$(nproc)"

      - name: Unit tests (ctest)
        run: cd build && ctest --output-on-failure

      - name: Full QA suite
        run: ./scripts/qa_full.sh

  # Сценарий «как на Windows»: Linux-образ из Dockerfile + полный QA внутри контейнера.
  docker-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vsecure-transfer:ci .

      - name: QA inside container (gen_keys + qa_full)
        run: |
          docker run --rm vsecure-transfer:ci bash -lc \
            'cd /app && ./scripts/gen_keys.sh && ./scripts/qa_full.sh'
